<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceKafe Brew Tools</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-bottom:5px;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

input{
width:80%;
padding:12px;
margin:8px;
border-radius:8px;
border:none;
}

button{
background:#c59d5f;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.product{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

.product-info{
padding:10px;
}

.buy{
background:#c59d5f;
padding:6px 10px;
border-radius:6px;
font-size:13px;
display:inline-block;
margin-top:5px;
}

a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>SpaceKafe Brew Tools</h1>
<p class="subtitle">Tools sederhana untuk barista ☕</p>


<div class="card">

<h2>Brew Ratio Calculator</h2>

<input id="coffee" type="number" placeholder="Gram kopi">

<input id="ratio" type="number" placeholder="Rasio (contoh 15)">

<br>

<button onclick="brewCalc()">Hitung Air</button>

<div id="brewResult" class="result"></div>

</div>



<div class="card">

<h2>Espresso Ratio Calculator</h2>

<input id="dose" type="number" placeholder="Dose kopi (gram)">

<input id="espressoRatio" type="number" placeholder="Ratio (contoh 2)">

<br>

<button onclick="espressoCalc()">Hitung Yield</button>

<div id="espressoResult" class="result"></div>

</div>



<div class="card">

<h2>Cold Brew Calculator</h2>

<input id="coldCoffee" type="number" placeholder="Gram kopi">

<input id="coldRatio" type="number" placeholder="Rasio (contoh 10)">

<br>

<button onclick="coldCalc()">Hitung Air</button>

<div id="coldResult" class="result"></div>

</div>



<div class="card">

<h2>Coffee Gear</h2>

<div class="products">

<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1517705008128-361805f42e86">
<div class="product-info">
V60 Dripper
<div class="buy">Lihat di Shopee</div>
</div>
</div>
</a>


<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<div class="product-info">
Coffee Scale
<div class="buy">Lihat di Shopee</div>
</div>
</div>
</a>


<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
<div class="product-info">
Gooseneck Kettle
<div class="buy">Lihat di Shopee</div>
</div>
</div>
</a>


<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735">
<div class="product-info">
Manual Coffee Grinder
<div class="buy">Lihat di Shopee</div>
</div>
</div>
</a>

</div>

</div>

</div>



<script>

function brewCalc(){

let coffee=document.getElementById("coffee").value
let ratio=document.getElementById("ratio").value

let water=coffeeratio

document.getElementById("brewResult").innerHTML=
"Air yang dibutuhkan: "+water+" ml"

}



function espressoCalc(){

let dose=document.getElementById("dose").value
let ratio=document.getElementById("espressoRatio").value

let yield=doseratio

document.getElementById("espressoResult").innerHTML=
"Target espresso yield: "+yield+" gram"

}



function coldCalc(){

let coffee=document.getElementById("coldCoffee").value
let ratio=document.getElementById("coldRatio").value

let water=coffee*ratio

document.getElementById("coldResult").innerHTML=
"Air yang dibutuhkan: "+water+" ml"

}

</script>

</body>
</html>
