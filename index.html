<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceKafe Brew Tools</title>

<style>

body{
font-family:system-ui;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#1e1e1e;
padding:30px;
border-radius:12px;
margin-top:20px;
}

input{
width:80%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

button{
background:#c59d5f;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

h1{
margin-bottom:10px;
}

.products{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.product{
background:#1e1e1e;
border-radius:10px;
padding:10px;
}

.product img{
width:100%;
border-radius:10px;
}

a{
text-decoration:none;
color:white;
}

.buy{
margin-top:10px;
display:inline-block;
background:#c59d5f;
padding:8px 15px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>SpaceKafe Brew Tools</h1>
<p>Tools sederhana untuk barista ☕</p>

<div class="card">

<h2>Brew Ratio Calculator</h2>

<input id="coffee" type="number" placeholder="Gram kopi">

<input id="ratio" type="number" placeholder="Rasio (contoh 15)">

<br>

<button onclick="hitung()">Hitung Air</button>

<h3 id="hasil"></h3>

</div>

<h2 style="margin-top:50px;">Coffee Gear</h2>

<div class="products">

<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1517705008128-361805f42e86">
<h4>V60 Dripper</h4>
<div class="buy">Lihat di Shopee</div>
</div>
</a>

<a href="https://collshp.com/iysigh1_" target="_blank">
<div class="product">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<h4>Coffee Scale</h4>
<div class="buy">Lihat di Shopee</div>
</div>
</a>

</div>

</div>

<script>

function hitung(){

let coffee =
document.getElementById("coffee").value

let ratio =
document.getElementById("ratio").value

let water = coffee * ratio

document.getElementById("hasil").innerHTML =
"Air yang dibutuhkan: " + water + " ml"

}

</script>

</body>
</html>
